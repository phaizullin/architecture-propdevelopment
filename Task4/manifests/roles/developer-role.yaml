apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: developer
  labels:
    app.kubernetes.io/name: propdevelopment-rbac
    app.kubernetes.io/component: developer-role
    app.kubernetes.io/managed-by: manual
rules:
# Управление приложениями в назначенных namespace
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

- apiGroups: [""]
  resources: ["pods", "services", "endpoints", "configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# Чтение логов и статусов
- apiGroups: [""]
  resources: ["pods/log", "pods/status", "pods/exec"]
  verbs: ["get", "list", "watch", "create"]

# Просмотр namespace (но не создание)
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch"]

# Events для отладки
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]

# Ingress для настройки доступа к приложениям
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# HPA для автомасштабирования
- apiGroups: ["autoscaling"]
  resources: ["horizontalpodautoscalers"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

# Запрет на secrets - не указываем их в rules
# Запрет на RBAC ресурсы - не указываем их в rules
# Запрет на создание namespace - только просмотр
